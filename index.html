<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer;
let car, trackCurve, trackWidth, cabin, Rundenzeit, canvas, context, ZeitTexture, DiagonalVektor, Display;
let startPosition = new THREE.Vector3(-3, 0.75, -4);
let lapActive = false;
let velocity = new THREE.Vector3();
let direction = 0;
let driftCharge = 0;
let boost = 0;
let trackSamples = [];
let lastTime = performance.now();
let trackIndex = 0;
const carRadius = 1.2;

let keys = {};
let started = false;
let carLoaded = false;

let startTime = 0;
let Bestzeit = 500




init();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.BasicShadowMap;
  document.body.appendChild(renderer.domElement);

  // Licht
  const light =
  new THREE.DirectionalLight(0xffaaaa,2.5);

  light.position.set(300,70,-50);

  // Mittelpunkt der Szene
  light.target.position.set(-30,0,-50);

  scene.add(light.target);

  light.castShadow = true;

  // Schattenqualität
  light.shadow.mapSize.width = 1024;
  light.shadow.mapSize.height = 1024;

  // Schattenbereich
  light.shadow.camera.left = -180;
  light.shadow.camera.right = 180;
  light.shadow.camera.top = 180;
  light.shadow.camera.bottom = -180;
  light.shadow.camera.near = 1;
  light.shadow.camera.far = 500;
  // Schattenfehler reduzieren
  light.shadow.bias = -0.0002;

  scene.add(light);
  // Umgebungslicht etwas wärmer
  scene.add(new THREE.AmbientLight(0xfff4e0,0.45));

  //Helper
  //const helper = new THREE.CameraHelper(light.shadow.camera);
  //scene.add(helper);

  //scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  createGround();
  createTrack();
  Trees();
  ZielEinfahrt();
  WoodCabin();
  BestzeitanzeigeSetUp();
  loadCar();

  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  animate();
}

// Boden
function createGround() {
  const geo = new THREE.PlaneGeometry(600, 600);
  const mat = new THREE.MeshStandardMaterial({ color: 0x013220 });
  const ground = new THREE.Mesh(geo, mat);
  ground.receiveShadow = true;
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
}

// Strecke
function createTrack() {

  trackWidth = 6;
  const segments = 80;

  // Kontrollpunkte
  const points = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -80),
    new THREE.Vector3(-80, 0, -80),
    new THREE.Vector3(-80, 0, -60),
    new THREE.Vector3(-20, 0, -60),
    new THREE.Vector3(-20, 0, -40),
    new THREE.Vector3(-100, 0, -40),
    new THREE.Vector3(-100, 0, -100),
    new THREE.Vector3(0, 0, -100), 
    new THREE.Vector3(40, 0, 0),
  ];

  const curve = new THREE.CatmullRomCurve3(points, true); // true = geschlossen

  trackCurve = curve;

  const leftPoints = [];
  const rightPoints = [];

  for (let i = 0; i <= segments; i++) {

    const t = i / segments;

    const point = curve.getPoint(t);
    const tangent = curve.getTangent(t).normalize();

    // Normale berechnen (links/rechts)
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);

    leftPoints.push(new THREE.Vector3(point.x + normal.x * trackWidth,0.02,point.z + normal.z * trackWidth));

    rightPoints.push(new THREE.Vector3(point.x - normal.x * trackWidth,0.02,point.z - normal.z * trackWidth));
  }

  // Geometrie bauen
  const vertices = [];
  const indices = [];
  const uvs = [];

  for (let i = 0; i < segments; i++) {

    const a = leftPoints[i];
    const b = rightPoints[i];
    const c = leftPoints[i + 1];
    const d = rightPoints[i + 1];

    const index = vertices.length / 3;

    vertices.push(a.x, a.y, a.z);
    vertices.push(b.x, b.y, b.z);
    vertices.push(c.x, c.y, c.z);
    vertices.push(d.x, d.y, d.z);


    const v = i / segments;
    const vNext = (i + 1) / segments;

    uvs.push(0, v);
    uvs.push(1, v);
    uvs.push(0, vNext);
    uvs.push(1, vNext);


    indices.push(index, index + 1, index + 2);
    indices.push(index + 2, index + 1, index + 3);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();

  const loader = new THREE.TextureLoader();
  const Asphalt_texture = loader.load("textures/Asphalt.jpg");
  const Asphalt_texture_normal = loader.load("textures/Asphalt_ambient.png")

  Asphalt_texture.colorSpace = THREE.SRGBColorSpace;
  Asphalt_texture_normal.colorSpace = THREE.NoColorSpace;

  Asphalt_texture.wrapS = THREE.RepeatWrapping;
  Asphalt_texture.wrapT = THREE.RepeatWrapping;
  Asphalt_texture.repeat.set(1, segments / 10);

  const material = new THREE.MeshStandardMaterial({color: 0x2f2f2f,side: THREE.DoubleSide,map:Asphalt_texture,normalMap:Asphalt_texture_normal});
  //material.flatShading = true;

  const track = new THREE.Mesh(geometry, material);
  track.receiveShadow = true;
  scene.add(track);

  trackSamples = [];

  for (let i = 0; i <= 500; i++) {
    const t = i / 500;
    trackSamples.push(trackCurve.getPoint(t));
  }
  
  Leitplanken(leftPoints,rightPoints);
}


//Leitplanken
function Leitplanken(leftPoints, rightPoints) {

  const height = 1;
  const thickness = 0.5;

  const material = new THREE.MeshStandardMaterial({color: 0xaaaaaa,metalness: 0.8,roughness: 0.3});

  const segmentCount = (leftPoints.length - 1) + (rightPoints.length - 1);

  // Einheitliche Geometrie
  const geometry = new THREE.BoxGeometry(thickness,height,1);

  const guardrail = new THREE.InstancedMesh(geometry,material,segmentCount);

  guardrail.castShadow = true;

  const dummy = new THREE.Object3D();

  let index = 0;

  function buildSide(points) {

    for (let i = 0;i < points.length - 1;i++) {

      const p1 = points[i];
      const p2 = points[i + 1];

      // Mittelpunkt
      dummy.position.copy(p1);
      dummy.position.add(p2);
      dummy.position.multiplyScalar(0.5);

      dummy.position.y = height / 2;
      // Länge
      const length = p1.distanceTo(p2);

      // Rotation
      dummy.rotation.set(0,Math.atan2(p2.x - p1.x,p2.z - p1.z),0 );

      // Skalierung
      dummy.scale.set(1,1,length);
      dummy.updateMatrix();
      guardrail.setMatrixAt(index,dummy.matrix);

      index++;
    }
  }

  buildSide(leftPoints);

  buildSide(rightPoints);

  guardrail.count = index;

  guardrail.instanceMatrix
    .needsUpdate = true;

  scene.add(guardrail);
}

//Kollisionspunkt finden
function getNearestPointOnTrack(position) {

  const len = trackSamples.length;

  let nearestPoint = trackSamples[trackIndex];
  let minDist = Infinity;

  const range = 6;

  let bestIndex = trackIndex;

  for (let offset = -range; offset <= range; offset++) {

    const i = (trackIndex + offset + len) % len;
    const point = trackSamples[i];

    const dx = position.x - point.x;
    const dz = position.z - point.z;
    const dist = dx * dx + dz * dz;

    if (dist < minDist) {
      minDist = dist;
      nearestPoint = point;
      bestIndex = i;
    }
  }

  trackIndex = bestIndex;

  return {
    nearestPoint,
    minDist: Math.sqrt(minDist)
  };
}

//Hütte
function WoodCabin() {
  const loader = new GLTFLoader();
  
  loader.load("models/cabin.glb",function(gltf) {
      cabin = gltf.scene;

      cabin.scale.set (2,2,2);
      cabin.position.set(1.8,2.1,-2);

      cabin.traverse((child)=>{
        if(child.isMesh){
          child.castShadow = true;
          child.receiveShadow = true;

          child.material.side = THREE.FrontSide;
        }
      });
      scene.add(cabin);
  },
  undefined,
  (error) => {console.error("Fehler beim Laden der Cabin:", error);});
}


//Bäume
function Trees() {

  const loader = new THREE.TextureLoader();
  const wood_texture = loader.load( "textures/Wood_Texture.jpg" );
  const normal_wood_texture = loader.load( "textures/Wood_Texture_ambient.png" );
  const blätter_werk = loader.load("textures/Blätterwerk.jpg");
  const blätter_werk_normal = loader.load("textures/Blätterwerk_ambient.png");

  wood_texture.colorSpace = THREE.SRGBColorSpace;
  normal_wood_texture.colorSpace = THREE.NoColorSpace;
  blätter_werk.colorSpace = THREE.SRGBColorSpace;
  blätter_werk_normal.colorSpace = THREE.NoColorSpace;
  
  const trunkGeo = new THREE.CylinderGeometry(1, 2, 8.5);
  const trunkMat = new THREE.MeshStandardMaterial();

  const leavesGeo = new THREE.ConeGeometry(7, 10, 20);
  const leavesMat = new THREE.MeshStandardMaterial();

  const maxTrees = 800;

  const trunks = new THREE.InstancedMesh(trunkGeo,trunkMat,maxTrees);

  const leaves = new THREE.InstancedMesh(leavesGeo,leavesMat,maxTrees);

  trunks.castShadow = true;
  trunks.receiveShadow = true;

  leaves.castShadow = true;
  leaves.receiveShadow = true;

  const areaSize = 600;
  const minDistanceToTrack = 400;

  const dummy = new THREE.Object3D();

  let treeCount = 0;

  for (let i = 0; i < maxTrees; i++) {

    const x = (Math.random() - 0.5) * areaSize;
    const z = (Math.random() - 0.5) * areaSize;

    dummy.position.set(x, 0, z);
    const pos = dummy.position;

    let minDist = Infinity;

    for (let j = 0; j < trackSamples.length; j += 5) {

      const dx = trackSamples[j].x - pos.x;
      const dz = trackSamples[j].z - pos.z;

      const d = dx * dx + dz * dz;

      if (d < minDist) {minDist = d;}
    }

    if (minDist < minDistanceToTrack) continue;

    const scale = 0.8 + Math.random() * 0.5;

    // Stamm
    dummy.position.set(x, 4.25 * scale, z);
    dummy.scale.set(scale, scale, scale);
    dummy.updateMatrix();

    trunks.setMatrixAt(treeCount, dummy.matrix);

    // Blätter
    dummy.position.set(x, 12 * scale, z);
    dummy.scale.set(scale, scale, scale);
    dummy.updateMatrix();

    leaves.setMatrixAt(treeCount, dummy.matrix);

    treeCount++;
  }

  trunks.count = treeCount;
  leaves.count = treeCount;

  trunks.instanceMatrix.needsUpdate = true;
  leaves.instanceMatrix.needsUpdate = true;

  trunks.material.color.set(0x8b5a2b);
  trunks.material.map = wood_texture;
  trunks.material.normalMap = normal_wood_texture;
  trunks.material.needsUpdate = true;

  leaves.material.color.set(0x0b6623);
  leaves.material.map = blätter_werk;
  leaves.material.normalMap = blätter_werk_normal;
  leaves.material.needsUpdate = true;

  scene.add(trunks);
  scene.add(leaves);
}

//ZielEinfahrt
function ZielEinfahrt(){
  const StangenMaterial = new THREE.MeshStandardMaterial({color:0xffff00,});
  const StangenGeo = new THREE.CylinderGeometry(0.2,0.2,10,50);

  const Stangelinks = new THREE.Mesh(StangenGeo,StangenMaterial);
  const Stangerechts = new THREE.Mesh(StangenGeo,StangenMaterial);

  Stangelinks.position.set(-8.3,5,-4);
  Stangerechts.position.set(4.5,5,-4);
  Stangelinks.receiveShadow = true;
  Stangerechts.receiveShadow = true;
  Stangelinks.castShadow = true,
  Stangerechts.castShadow = true;

  scene.add(Stangelinks);
  scene.add(Stangerechts);

  
  const ZielGeometry = new THREE.BoxGeometry(1,1,1);
  let color;
  let colorswitch = false;
  
  for(let i = 0; i<14;i++){
    for(let f = 0; f<4;f++){
      if(colorswitch){
        color = 0x000000;
      }
      else{
        color = 0xffffff;
      }
      const ZielMaterial = new THREE.MeshStandardMaterial({color: color});
      
      const ZielMesh = new THREE.Mesh(ZielGeometry,ZielMaterial);
      ZielMesh.position.set(i-8.3,f+6,-4);
      ZielMesh.receiveShadow =true;
      ZielMesh.castShadow =true;


      scene.add(ZielMesh);

      colorswitch = !colorswitch;
    }
    colorswitch = !colorswitch;
  }

}

//Bestzeitanzeige
function BestzeitanzeigeSetUp(){
  const StützenMaterial = new THREE.MeshStandardMaterial({color:0xff0000});
  const StützenGeo = new THREE.CylinderGeometry(0.2,0.2,2,50);

  const Stützelinks = new THREE.Mesh(StützenGeo,StützenMaterial);
  const Stützerechts = new THREE.Mesh(StützenGeo,StützenMaterial);

  Stützelinks.position.set(-15,0.9,-27);
  Stützerechts.position.set(-12,0.9,-30);

  scene.add(Stützelinks);
  scene.add(Stützerechts);

  canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 256;

  context = canvas.getContext("2d");

  ZeitTexture = new THREE.CanvasTexture(canvas);

  const TafelmaterialInnen = new THREE.MeshStandardMaterial({color:0x000000});
  const TafelGeoInnen = new THREE.BoxGeometry(Math.sqrt(18),3,1); //Abstzand zwischen Stützen ist sqrt(18)

  const Tafelanzeige = new THREE.Mesh(TafelGeoInnen,TafelmaterialInnen);

  DiagonalVektor = new THREE.Vector3(-1,0,1); //für richtige Rotation
  
  Tafelanzeige.rotateY(Math.PI/4);
  Tafelanzeige.rotateOnWorldAxis(DiagonalVektor,Math.PI/7);
  Tafelanzeige.position.set(-13.5,1.5,-28.5);

  scene.add(Tafelanzeige);

  //Display
  const material = new THREE.MeshStandardMaterial({ map: ZeitTexture });
  const geometry = new THREE.PlaneGeometry(Math.sqrt(18), 3);

  Display = new THREE.Mesh(geometry, material);

  Display.receiveShadow = true;
  Display.rotateY(Math.PI/4);
  Display.rotateOnWorldAxis(DiagonalVektor,Math.PI/7);
  Display.position.set(-13.17, 1.75, -28.17);

  const TafelmaterialAußen = new THREE.MeshStandardMaterial({color:0xffff00});
  const TafelGeoAußen = new THREE.BoxGeometry(Math.sqrt(18)+0.3,3.3,0.9);

  const Tafelumrandung = new THREE.Mesh(TafelGeoAußen,TafelmaterialAußen);

  Tafelumrandung.rotateY(Math.PI/4);
  Tafelumrandung.rotateOnWorldAxis(DiagonalVektor,Math.PI/7);
  Tafelumrandung.position.set(-13.5,1.5,-28.5);

  scene.add(Tafelumrandung);
}


//Auto
function loadCar() {
  const loader = new GLTFLoader();
  

  loader.load("models/cartoon_car.glb",function(gltf) {
      car = gltf.scene;

      car.scale.set(0.2, 0.2, 0.2);
      car.position.set(-3, 0.75, -4);
      car.position.copy(startPosition);
      car.traverse((child)=>{
        if(child.isMesh){
          child.castShadow = true;
          child.receiveShadow = true;

          child.material.side = THREE.FrontSide;
        }
      });

      scene.add(car);

      carLoaded = true;
      console.log("Auto geladen");
    },
    undefined,
    (error) => {console.error("Fehler beim Laden des Autos:", error);}
  );
}

const buffervectorCarMove = new THREE.Vector3();
const buffervectorCar = new THREE.Vector3(0,1,0);
const buffervectorCam = new THREE.Vector3();
const forward = new THREE.Vector3();
const right = new THREE.Vector3(-forward.z, 0, forward.x);
const camOffset = new THREE.Vector3();
const positionLerp = new THREE.Vector3();
const pushDirUpdateCar = new THREE.Vector3();
const driftVector = new THREE.Vector3();
//Physik
function updateCar(delta) {
  if (!car) return;

  const accel = 0.005;
  const reverseAccel = 0.003;
  const friction = 0.96;
  const turnSpeed = 0.18;

  const isDrifting = keys['shift'];

  forward.set(0, 0, -1);
  forward.applyAxisAngle(buffervectorCar/*.set(0,1,0)*/, direction);

  //right.set(-forward.z, 0, forward.x);

  const speed = velocity.length();

  // Beschleunigung
  if (keys['w']) {
    buffervectorCarMove.copy(forward);
    buffervectorCarMove.multiplyScalar(accel * delta);
    velocity.add(buffervectorCarMove);
  }

  if (keys['s']) {
    buffervectorCarMove.copy(forward);
    buffervectorCarMove.multiplyScalar(-reverseAccel * delta);
    velocity.add(buffervectorCarMove);
  }

   const driftTurnMultiplier = isDrifting ? 1.7 : 1;
  //Kein Drehen im Stand
  if (speed > 0.05) {
    if (keys['a']) direction += turnSpeed * speed * driftTurnMultiplier * delta;
    if (keys['d']) direction -= turnSpeed * speed * driftTurnMultiplier * delta;
  }

  if (isDrifting && speed > 0.05 && (keys['a'] || keys['d'])) {
    driftCharge += delta/250;
    driftCharge = Math.min(driftCharge, 1);
  //seitliche Driftkraft
  if (keys['a']) {
    buffervectorCarMove.copy(right);
    buffervectorCarMove.multiplyScalar(0.015 * speed * delta);
    velocity.add(buffervectorCarMove);
  }
  if (keys['d']) {
    buffervectorCarMove.copy(right);
    buffervectorCarMove.multiplyScalar(-0.015 * speed * delta);
    velocity.add(buffervectorCarMove);
  }

  // Drift + Grip
  const forwardSpeed = velocity.dot(forward);
  const sideSpeed = velocity.dot(right);

  const driftFactor = 0.7;   // weniger = weniger Drift

  driftVector.copy(forward);
  driftVector.multiplyScalar(forwardSpeed);

  buffervectorCarMove.copy(right);
  buffervectorCarMove.multiplyScalar(sideSpeed * driftFactor);

  driftVector.add(buffervectorCarMove);

  velocity.x += (driftVector.x - velocity.x) * 0.2;
  velocity.y += (driftVector.y - velocity.y) * 0.2;
  velocity.z += (driftVector.z - velocity.z) * 0.2;

} else {
  // normaler Grip
  const forwardSpeed = velocity.dot(forward);
  velocity.copy(forward);
  velocity.multiplyScalar(forwardSpeed);
}
if (!isDrifting && driftCharge > 0.1) {
  boost = driftCharge * 0.02;
  driftCharge = 0;
}

  // Reibung
  velocity.multiplyScalar(Math.pow(friction, delta));
  boost *= Math.pow(0.92, delta);

  // Bewegung
  buffervectorCarMove.copy(forward)
  buffervectorCarMove.multiplyScalar(boost);
  velocity.add(buffervectorCarMove);

  car.position.add(velocity);
  
  // Y fix
  car.position.y = 0.75;

  // Rotation
  car.rotation.y = direction;

  // Kollision
  const { nearestPoint, minDist } = getNearestPointOnTrack(car.position);

  if (minDist > trackWidth - carRadius) {

    pushDirUpdateCar.subVectors(car.position, nearestPoint);
    pushDirUpdateCar.normalize();

    const allowedDist = trackWidth - carRadius;

    const correction = pushDirUpdateCar.multiplyScalar(minDist - allowedDist);

    car.position.sub(correction);

    // Geschwindigkeit abbremsen
    velocity.projectOnPlane(pushDirUpdateCar);

    velocity.multiplyScalar(0.5);
  }

  // Kamera
  camOffset.set(0, 5, 12);
  camOffset.applyAxisAngle(buffervectorCam.set(0,1,0), direction);

  camera.position.lerp(positionLerp.set(car.position.x + camOffset.x,car.position.y + camOffset.y,car.position.z + camOffset.z), 0.05);

  camera.lookAt(car.position);
}

function checkLap() {
  if (!car) return;

  const distance = car.position.distanceTo(startPosition);

  // Auto entfernt sich vom Start
  if (distance > 20) {
    lapActive = true;
  }

  // Auto kommt zurück → neue Runde
 if (distance < 5 && lapActive) {

  const newTime = (performance.now() - startTime) / 1000;

  lapActive = false;
  startTime = performance.now();

  Rundenzeit = newTime;

  console.log("Neue Runde!", newTime);

  if (newTime < Bestzeit) {
    neueBestzeit(newTime);
  }
}
}

// UI Zeit
function updateUI() {
  const t = (performance.now() - startTime) / 1000;
  document.getElementById("time").innerText = t.toFixed(2);
}

function setupControlsUI() {
  const el = document.getElementById("controlsUI");

  el.innerHTML = `
    <b>Steuerung</b><br><br>
    W: Vorwärts<br>
    A: Links<br>
    S: Rückwärts<br>
    D: Rechts<br>
    Shift: Drift
  `;

  el.style.display = "block";
}

//Bestzeit schreiben
function BestzeitSchreiben(text){
  context.fillStyle = "black";
  context.fillRect(0, 0, canvas.width, canvas.height);
  context.fillStyle = "white";
  context.font = "bold 60px Arial";
  context.textAlign = "center";
  
  context.fillText("BESTZEIT:", canvas.width / 2, (canvas.height / 2) -50);
  context.fillText(text +" s", canvas.width / 2, (canvas.height / 2) +30);

  ZeitTexture.needsUpdate = true;
}

function neueBestzeit(time){
  
  BestzeitSchreiben(time.toFixed(2));
  Bestzeit = time.toFixed(2);

  scene.add(Display);
}



//Loooooooop
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = Math.min((now-lastTime)/16.666,2); // 60fps norm
  lastTime = now;

  if (started) {
    updateCar(delta);
    updateUI();
    checkLap();
  }

  renderer.render(scene, camera);
}

//Start
document.getElementById("startBtn").onclick = () => {
  
   if (!carLoaded) {
    
    alert("Auto lädt noch, bitte kurz warten...");
    return;
  }

  started = true;
  startTime = performance.now();
  

  document.getElementById("menu").style.display = "none";
  document.getElementById("ui").style.display = "block";

  setupControlsUI();
};
</script>
